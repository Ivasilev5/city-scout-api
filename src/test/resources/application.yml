spring:
  datasource:
    url: jdbc:h2:mem:city-scout;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false

  flyway:
    enabled: false

city-scout:
  nearby:
    default-limit: 10
    max-limit: 100
