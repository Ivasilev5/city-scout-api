spring:
  application:
    name: city-scout-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:cityscout}
    username: ${DB_USER:cityscout}
    password: ${DB_PASSWORD:cityscout}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

city-scout:
  nearby:
    default-limit: 10
    max-limit: 100

logging:
  level:
    com.cityscout: INFO
    org.springframework.web: WARN
